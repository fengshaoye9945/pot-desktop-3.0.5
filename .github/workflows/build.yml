name: Build and Package

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
    
    - name: Install pnpm
      run: npm install -g pnpm@8.15.0
    
    - name: Install dependencies
      run: pnpm install
    
    - name: Sync version
      run: |
        $version = (Get-Content package.json | ConvertFrom-Json).version
        (Get-Content src-tauri/Cargo.toml) -replace '^version = ".*"', "version = `"$version`"" | Set-Content src-tauri/Cargo.toml
        Write-Host "Version set to $version"
      shell: pwsh
    
    - name: Build Tauri app
      run: |
        $env:TAURI_PRIVATE_KEY=""
        $env:TAURI_KEY_PASSWORD=""
        pnpm tauri build -b nsis --target x86_64-pc-windows-msvc
      shell: pwsh
    
    - name: List files for debugging
      run: |
        Write-Host "=== Looking for exe files ==="
        Get-ChildItem -Path src-tauri/target -Recurse -Filter "*.exe" | ForEach-Object { $_.FullName }
        Write-Host "=== Looking for json files ==="
        Get-ChildItem -Path src-tauri/target -Recurse -Filter "*.json" | ForEach-Object { $_.FullName }
      shell: pwsh
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: pot-installer
        path: |
          src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          src-tauri/target/x86_64-pc-windows-msvc/release/bundle/updater/*.json
